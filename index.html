<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись на маникюр</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prevMonth">&lt;</button>
            <h2 id="monthYear"></h2>
            <button id="nextMonth">&gt;</button>
        </div>
        
        <div class="calendar-grid">
            <div class="day-label">Пн</div>
            <div class="day-label">Вт</div>
            <div class="day-label">Ср</div>
            <div class="day-label">Чт</div>
            <div class="day-label">Пт</div>
            <div class="day-label">Сб</div>
            <div class="day-label">Вс</div>
            <div id="calendarDays" class="days-container">
                </div>
        </div>
    </div>

    <button id="confirmBtn" class="confirm-btn" style="display: none;">Подтвердить запись</button>

    <script src="script.js"></script>
</body>
</html>
